$schema: 'https://moonrepo.dev/schemas/project.json'

# Marketing/docs site for the Cynco ledger suite (journals + accounts).
# Local-only tasks avoid presets and set options explicitly; graph-connected
# dev/serve tasks stay `runInCI: 'skip'` (run them with a `CI=` prefix or
# --ignore-ci-checks in CI-marked shells like agent harnesses).
language: 'typescript'
layer: 'application'

tasks:
  # The llms.txt generator runs before every build so the static export
  # always ships fresh /llms.txt + /llms-full.txt, assembled from the docs
  # pages' MDX sources (app/docs/*/content.mdx, already covered by the
  # app/** input) with versions read live from each package.json; theme has
  # no docs page and contributes its README + ACCESSIBILITY.md. The
  # generated files are gitignored build artifacts: declared as outputs,
  # never inputs (inputs here are explicit, so they can't leak into the
  # hash anyway).
  #
  # The build always exports (NEXT_OUTPUT=export is the only deployed
  # shape), and Pagefind then indexes the exported HTML into out/pagefind/
  # — the search dialog imports /pagefind/pagefind.js at runtime, so the
  # index must ship inside the same artifact as the pages. Any lane that
  # runs `next build` outside moon (the wrangler deploy in
  # .github/workflows/deploy-docs.yml) must run `pagefind --site out`
  # between build and deploy or the export ships without search.
  build:
    script:
      'bun scripts/generate-llms-txt.ts && next build && pagefind --site out'
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_OUTPUT: 'export'
    deps:
      - '^:build'
    inputs:
      - 'app/**'
      - 'components/**'
      - 'examples/**'
      - 'lib/**'
      - 'scripts/**'
      - 'mdx-components.tsx'
      - 'next.config.ts'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
      - '/packages/{journals,accounts,statements,theming,theme,importers}/package.json'
      - '/packages/theme/README.md'
      - '/packages/theme/ACCESSIBILITY.md'
    outputs:
      - '.next'
      - 'out'
      - 'public/llms.txt'
      - 'public/llms-full.txt'

  # Standalone regeneration for flows that run `next build` outside moon —
  # the wrangler static-assets deploy documented in wrangler.jsonc. No graph
  # edges, so runInCI 'always' is safe (it can never be pulled into CI).
  generate-llms-txt:
    command: 'bun scripts/generate-llms-txt.ts'
    options:
      cache: false
      runInCI: 'always'

  # Overrides the inherited single-program typecheck: the app program
  # (tsconfig.json) excludes test/ because the bun-test suite needs
  # @types/bun globals that must not leak into the Next app program, so the
  # tests typecheck as a second program (tsconfig.test.json — same split as
  # the root scripts/tsconfig.json). Deps and inputs mirror the inherited
  # task from .moon/tasks/bun-common.yml.
  typecheck:
    script:
      'tsgo --noEmit --pretty && tsgo --noEmit --pretty -p tsconfig.test.json'
    deps:
      - '^:build'
    inputs:
      - '**/*'
      - '!node_modules/**'
      - '!dist/**'
      - '!.next/**'
      - '!**/*.tsbuildinfo'

  # Build deps run to completion first so next resolves @cynco/* through
  # complete dists. The port shifts by the worktree's offset from
  # .env.worktree (written by scripts/wt.ts, loaded via envFile — missing in
  # the primary checkout, which therefore keeps 4700).
  dev:
    script: 'next dev --port $(( ${CYNCO_PORT_OFFSET:-0} + 4700 ))'
    deps:
      - '^:build'
    options:
      cache: false
      persistent: true
      runInCI: 'skip'
      envFile: '/.env.worktree'

  # `next start` refuses export-mode builds (docs:build sets
  # NEXT_OUTPUT=export), so run a plain `next build` first when using this.
  # To preview the deployed shape (including /pagefind/ search), serve the
  # out/ directory with any static file server instead.
  serve:
    script: 'next start --port $(( ${CYNCO_PORT_OFFSET:-0} + 4700 ))'
    options:
      cache: false
      persistent: true
      runInCI: 'skip'
      envFile: '/.env.worktree'
