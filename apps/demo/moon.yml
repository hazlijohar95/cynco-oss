$schema: 'https://moonrepo.dev/schemas/project.json'

# Private kitchen-sink harness for @cynco/journals. Local-only tasks avoid
# presets and set options explicitly; graph-connected dev/serve tasks stay
# `runInCI: 'skip'` (run them with a `CI=` prefix or --ignore-ci-checks in
# CI-marked shells like agent harnesses).
language: 'typescript'
layer: 'application'

workspace:
  inheritedTasks:
    # No test suite in this app.
    exclude: ['test']

tasks:
  build:
    command: 'vite build'
    deps:
      - '^:build'
    inputs:
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
    outputs:
      - 'dist'

  # Build deps run to completion first so vite resolves @cynco/* through
  # complete dists. The port shifts by the worktree's offset from
  # .env.worktree (written by scripts/wt.ts, loaded via envFile — missing in
  # the primary checkout, which therefore keeps 4600). The CLI --port
  # overrides vite.config.ts's pinned default; strictPort stays in force.
  dev:
    script: 'vite --port $(( ${CYNCO_PORT_OFFSET:-0} + 4600 ))'
    deps:
      - '^:build'
    options:
      cache: false
      persistent: true
      runInCI: 'skip'
      envFile: '/.env.worktree'

  serve:
    script: 'vite preview --port $(( ${CYNCO_PORT_OFFSET:-0} + 4600 ))'
    options:
      cache: false
      persistent: true
      runInCI: 'skip'
      envFile: '/.env.worktree'
