name: Deploy docs

# Builds the static export of the docs/marketing site and ships it to
# Cloudflare Workers static assets whenever main changes. Requires the
# CLOUDFLARE_API_TOKEN repository secret (Workers Scripts: Edit permission).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: true

env:
  NO_COLOR: 1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      # proto installs the exact toolchain pinned in .prototools; moon then
      # installs workspace dependencies with a frozen lockfile on demand.
      - uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-install: true

      # Build the workspace package dists the docs app resolves against.
      - name: Build package dependencies
        run:
          moon run journals:build accounts:build theme:build ledger-core:build
          ledger-test-data:build statements:build

      # This lane runs `next build` directly (not `moon run docs:build`), so
      # the llms.txt generation baked into the moon task must run explicitly
      # or the export ships stale/missing /llms.txt + /llms-full.txt.
      - name: Generate llms.txt
        run: moon run docs:generate-llms-txt

      - name: Build static export
        working-directory: apps/docs
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_OUTPUT: 'export'
        run: pnpm exec next build

      # wrangler is a workspace devDependency (pnpm catalog) because the
      # action's ad-hoc fallback installs with npm, which cannot parse the
      # pnpm-only `catalog:` protocol in package.json. packageManager: pnpm
      # makes the action detect and reuse the already-installed binary.
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/docs
          packageManager: pnpm
          command: deploy
