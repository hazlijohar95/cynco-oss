name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Byte-clean logs for humans and agents; moon already detects CI.
  NO_COLOR: 1

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so moon can diff against the merge base for
      # affected-task filtering.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      # proto installs the exact toolchain pinned in .prototools; moon then
      # installs workspace dependencies with a frozen lockfile on demand.
      - uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-install: true

      # Keep Playwright browsers across runs; system deps are per-runner and
      # reinstalled by --with-deps below.
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: ${{ runner.os }}-playwright-browsers-1.51.1
          path: ~/.cache/ms-playwright

      # Skip the expensive browser + system-deps install when moon will skip
      # the e2e targets anyway. Fail-open: any query error installs.
      - name: Check whether package e2e is affected
        id: e2e-affected
        run: |
          out="$(moon query tasks --affected --downstream deep 2>/dev/null)" || out="test-e2e"
          case "$out" in
            *test-e2e*) echo "run=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "run=false" >> "$GITHUB_OUTPUT" ;;
          esac

      # System libraries are per-runner and not covered by the browser cache.
      # The moon tasks also self-heal a missing binary, but installing here
      # keeps --with-deps system libraries in place.
      - name: Install Playwright browser
        if: steps.e2e-affected.outputs.run == 'true'
        run: pnpm dlx playwright@1.51.1 install --with-deps chromium

      - name: Format check
        run: moon run root:format-check

      # Explicit entry-point targets: bare `:task` shapes only bind to
      # projects affected by changed files, so every cross-project consumer
      # build is named to catch integration regressions. Affected-filtering
      # still skips untouched projects.
      - name: Build, test, lint
        run: >-
          moon ci --include-relations --summary detailed :build demo:build
          docs:build :test :typecheck journals:test-e2e accounts:test-e2e
          root:lint root:lint-css root:assert-tiers root:assert-wiring
          root:assert-lockstep root:assert-docs

  # Independent fast lane so a pinning regression fails in seconds without
  # waiting on the build matrix.
  actions-pinned:
    name: Actions pinned to SHA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Verify external actions are pinned to a full commit SHA
        run: |
          # Supply-chain guard: a movable tag or branch ref lets upstream (or
          # an attacker with tag access) swap the code CI runs, so every
          # external action must be pinned to a 40-character commit SHA with a
          # trailing `# vX.Y.Z` comment that Dependabot keeps in sync. Local
          # actions (uses: ./...) ship with the repo and are exempt.
          set -euo pipefail
          unpinned=$(
            grep -rEn '^[[:space:]]*-?[[:space:]]*uses:[[:space:]]*[^.[:space:]]' .github \
              | grep -vE 'uses:[[:space:]]*[^[:space:]]+@[0-9a-fA-F]{40}([[:space:]]|#|"|'"'"'|$)' \
              || true
          )
          if [ -n "$unpinned" ]; then
            echo "::error::These actions are not pinned to a full commit SHA:"
            echo "$unpinned"
            echo "Pin each to a 40-character commit SHA, e.g. owner/repo@<sha> # vX.Y.Z"
            exit 1
          fi
          echo "All external actions are pinned to a full commit SHA."
