$schema: 'https://moonrepo.dev/schemas/project.json'

# Root project: repo-wide tooling that intentionally runs over the whole
# workspace in one pass (type-aware oxlint, oxfmt, stylelint).
# These are fast enough that we always run them in CI rather than sharding
# them per project.
#
# Local-only tasks avoid presets and set options explicitly: presets force
# `runInCI: skip`, and moon refuses to run such tasks in CI-detected shells —
# which includes agent harnesses that export CI=1. moon ci executes every
# affected runInCI-enabled task, so `runInCI: 'always'` is reserved for tasks
# with no graph edges (no deps, no dependents) — they can never be affected
# through the graph and so never join the CI pipeline uninvited.
language: 'typescript'

# Type-aware lint resolves @cynco/* imports through each package's built
# dist (exactly like typecheck), so the root project depends on every
# dist-producing package and lint orders itself after their builds.
dependsOn:
  - 'theme'
  - 'theming'
  - 'ledger-core'
  - 'ledger-test-data'
  - 'journals'
  - 'accounts'
  - 'statements'
  - 'importers'

workspace:
  inheritedTasks:
    # The root project inherits JS/TS shared tasks, but the inherited `bun
    # test` would run every suite in the repo and the inherited typecheck
    # points at a project tsconfig that does not exist here. Scoped
    # replacements below cover the repo-level scripts/ tooling only.
    exclude: ['test', 'typecheck']

tasks:
  # Unit tests for repo-level release tooling (scripts/publish.ts pure
  # logic). The path filter keeps `moon run :test` from re-running package
  # suites through the root project. No ^:build dep: the scripts import
  # nothing from workspace packages.
  test:
    command: 'bun test scripts/'
    inputs:
      - 'scripts/**/*'
    options:
      runInCI: 'always'

  # scripts/ have no project tsconfig at the root (the inherited typecheck
  # would find nothing), so this scoped tsgo program is what typechecks them.
  typecheck:
    command: 'tsgo --noEmit --pretty -p scripts/tsconfig.json'
    inputs:
      - 'scripts/**/*'
    options:
      runInCI: 'always'

  # Architectural boundary guard: fails if any package's @cynco dependency
  # violates the tier direction (domain → surface/engine → fixtures, never up
  # or sideways). Reads each package's tier tag from its moon.yml plus its
  # manifest deps; no build needed, so it runs everywhere including CI.
  assert-tiers:
    command: 'bun scripts/assert-tiers.ts'
    inputs:
      - 'scripts/assert-tiers.ts'
      - 'packages/*/moon.yml'
      - 'packages/*/package.json'
    options:
      runInCI: 'always'

  # Wiring guard: every hand-maintained package list (this file's dependsOn,
  # PUBLISH_CONFIGS/PRIVATE_PACKAGES in scripts/publish.ts, the deploy-docs
  # build step) must match the actual workspace, and every publishable
  # package must carry README/LICENSE/sideEffects. Reads manifests and
  # workflow text only; no build needed, so it runs everywhere including CI.
  assert-wiring:
    command: 'bun scripts/assert-wiring.ts'
    inputs:
      - 'scripts/assert-wiring.ts'
      - 'scripts/publish.ts'
      - 'moon.yml'
      - 'packages/*/moon.yml'
      - 'packages/*/package.json'
      - 'packages/*/README.md'
      - 'packages/*/LICENSE.md'
      - 'apps/docs/package.json'
      - '.github/workflows/deploy-docs.yml'
    options:
      runInCI: 'always'

  # Lockstep guard: the deliberately duplicated types/tables across packages
  # (currency exponent table, AmountFormat + presets, importers' copies of
  # the entry shapes, CSS px ↔ JS constants) are compared as normalized
  # source text against a central registry — the mechanical form of every
  # "MUST mirror" comment. Reads sources as text; no build needed.
  assert-lockstep:
    command: 'bun scripts/assert-lockstep.ts'
    inputs:
      - 'scripts/assert-lockstep.ts'
      - 'packages/*/src/types.ts'
      - 'packages/*/src/constants.ts'
      - 'packages/ledger-core/src/currency.ts'
      - 'packages/*/src/style.css'
    options:
      runInCI: 'always'
  lint:
    command: 'oxlint --type-aware --tsconfig tsconfig.oxlint.json .'
    deps:
      - '^:build'
    inputs:
      # Explicit input globs are filesystem-walked (gitignore is not
      # applied), so installed and generated trees must be negated or every
      # node_modules file gets hashed into the task inputs. moon's own cache
      # is the critical one: its hash manifests are .js files that moon
      # writes WHILE the pipeline runs, and hashing them races git.
      - '**/*.{js,jsx,mjs,cjs,ts,tsx,mts,cts}'
      - '!.moon/cache/**'
      - '!.moon/hooks/**'
      - '!**/node_modules/**'
      - '!**/dist/**'
      - '!**/.next/**'
      - '.oxlintrc.json'
      - 'tsconfig.oxlint.json'
    options:
      runInCI: 'always'

  # Mutates code based on type information, so it needs fresh dist (like
  # lint) and must never be graph-pulled into CI: runInCI stays skip. In
  # CI-marked shells: `CI= moon run root:lint-fix`.
  lint-fix:
    command: 'oxlint --type-aware --tsconfig tsconfig.oxlint.json --fix .'
    deps:
      - '^:build'
    options:
      cache: false
      runInCI: 'skip'

  # Quoted glob is expanded by stylelint itself, not the shell. Generated CSS
  # is excluded via ignoreFiles in stylelint.config.js so results do not
  # depend on whether builds have run.
  lint-css:
    script: 'stylelint "**/*.css"'
    inputs:
      - '**/*.css'
      - '!**/node_modules/**'
      - '!**/dist/**'
      - '!**/.next/**'
      - '!apps/docs/out/**'
      - 'stylelint.config.js'
    options:
      runInCI: 'always'

  lint-css-fix:
    script: 'stylelint "**/*.css" --fix'
    options:
      cache: false
      runInCI: 'always'

  format:
    command: 'oxfmt .'
    options:
      cache: false
      runInCI: 'always'

  format-check:
    command: 'oxfmt --check .'
    inputs:
      # .moon/*.yml configs stay included (oxfmt formats them); only moon's
      # generated state is excluded — see the lint inputs note.
      - '**/*'
      - '!.moon/cache/**'
      - '!.moon/hooks/**'
      - '!**/node_modules/**'
      - '!**/dist/**'
      - '!**/.next/**'
    options:
      runInCI: 'always'

  # Worktree manager: create/list/remove/sync parallel worktrees, each with
  # its own port-offset block (see scripts/wt.ts and CONTRIBUTING.md
  # "Parallel worktrees"). Forward arguments with `moonx root:wt -- <args>`.
  # No graph edges, so runInCI 'always' is safe (see header note).
  wt:
    command: 'bun --silent scripts/wt.ts'
    options:
      cache: false
      interactive: true
      runInCI: 'always'

  clean:
    script:
      'rm -rf apps/*/.next packages/*/dist apps/*/tsconfig.tsbuildinfo
      packages/*/tsconfig.tsbuildinfo'
    options:
      cache: false
      runInCI: 'always'

  clean-all:
    script:
      'rm -rf apps/*/.next packages/*/dist apps/*/tsconfig.tsbuildinfo
      packages/*/tsconfig.tsbuildinfo node_modules packages/*/node_modules
      apps/*/node_modules'
    options:
      cache: false
      runInCI: 'always'
