  - '@moonrepo/cli'
  - '@moonrepo/core-linux-arm64-gnu'
  - '@moonrepo/core-linux-arm64-musl'
  - '@moonrepo/core-linux-x64-gnu'
  - '@moonrepo/core-linux-x64-musl'
  - '@moonrepo/core-macos-arm64'
  - '@moonrepo/core-macos-x64'
  - '@moonrepo/core-windows-x64-msvc'
  - '@oxc-project/types'
  - '@rolldown/binding-android-arm64'
  - '@rolldown/binding-darwin-arm64'
  - '@rolldown/binding-darwin-x64'
  - '@rolldown/binding-freebsd-x64'
  - '@rolldown/binding-linux-arm-gnueabihf'
  - '@rolldown/binding-linux-arm64-gnu'
  - '@rolldown/binding-linux-arm64-musl'
  - '@rolldown/binding-linux-ppc64-gnu'
  - '@rolldown/binding-linux-s390x-gnu'
  - '@rolldown/binding-linux-x64-gnu'
  - '@rolldown/binding-linux-x64-musl'
  - '@rolldown/binding-openharmony-arm64'
  - '@rolldown/binding-wasm32-wasi'
  - '@rolldown/binding-win32-arm64-msvc'
  - '@rolldown/binding-win32-x64-msvc'
  - '@typescript/native-preview'
  - '@typescript/native-preview-darwin-arm64'
  - '@typescript/native-preview-darwin-x64'
  - '@typescript/native-preview-linux-arm'
  - '@typescript/native-preview-linux-arm64'
  - '@typescript/native-preview-linux-x64'
  - '@typescript/native-preview-win32-arm64'
  - '@typescript/native-preview-win32-x64'
  - 'rolldown'
  - 'vite'

catalog:
  # arethetypeswrong: publish-time consumer type-resolution checks. cli and
  # core must stay in lockstep — the CLI is the human-debuggable face of the
  # exact core the publish script calls programmatically.
  '@arethetypeswrong/cli': '0.18.5'
  '@arethetypeswrong/core': '0.18.5'
  # Paper Shaders (Apache-2.0): WebGL status-badge shaders on the cynco.dev
  # index; bundled into apps/home/public/vendor by home:bundle-shaders.
  '@paper-design/shaders': 0.0.77
  '@moonrepo/cli': '2.3.3'
  '@playwright/test': '1.51.1'
  # Remotion Player (@remotion/player pins remotion to the same version):
  # programmatic product film on the ledger.cynco.dev index. Company license
  # applies to commercial use — see the film section notes.
  '@remotion/player': '4.0.488'
  'remotion': '4.0.488'
  '@base-ui/react': '1.6.0'
  '@tailwindcss/postcss': '4.1.13'
  '@tsdown/css': '0.22.3'
  '@types/bun': '1.3.14'
  '@types/hast': '3.0.4'
  '@types/jsdom': '28.0.1'
  '@types/node': '20.19.41'
  '@types/react': '19.2.7'
  '@types/react-dom': '19.2.3'
  '@typescript/native-preview': '7.0.0-dev.20260622.1'
  '@vitejs/plugin-react': '5.0.3'
  'autoprefixer': '10.4.22'
  'class-variance-authority': '0.7.1'
  'clsx': '2.1.1'
  'hast-util-to-html': '9.0.5'
  'jsdom': '26.1.0'
  'lightningcss': '1.32.0'
  'lint-staged': '16.2.7'
  'lru_map': '0.4.1'
  'lucide-react': '0.545.0'
  'mitata': '1.0.34'
  'next': '16.2.9'
  'next-mdx-remote': '6.0.0'
  'oxfmt': '0.55.0'
  'oxlint': '1.70.0'
  'oxlint-tsgolint': '0.23.0'
  'postcss': '8.5.6'
  'postcss-calc': '10.1.1'
  'postcss-import': '16.1.1'
  'postcss-nesting': '14.0.0'
  'preact': '11.0.0-beta.0'
  'preact-render-to-string': '6.6.5'
  'publint': '0.3.21'
  'react': '19.2.7'
  'react-dom': '19.2.7'
  'remark-gfm': '4.0.1'
  'stylelint': '17.13.0'
  'stylelint-config-standard': '40.0.0'
  'svgo': '4.0.1'
  'tailwind-merge': '3.3.1'
  'tailwindcss': '4.1.13'
  'tsdown': '0.22.3'
  'tw-animate-css': '1.4.0'
  'typescript': '6.0.3'
  'vite': '8.1.0'
  'wrangler': '4.110.0'
  'zod': '4.1.11'

overrides:
  '@types/react': 'catalog:'
  '@types/react-dom': 'catalog:'
  '@rolldown/binding-wasm32-wasi>@napi-rs/wasm-runtime': '1.1.5'
  '@tybys/wasm-util': '0.10.2'
  'next': 'catalog:'
  'react': 'catalog:'
  'react-dom': 'catalog:'
  'typescript': 'catalog:'

allowBuilds:
  '@tailwindcss/oxide': true
  'esbuild': true
  'sharp': true
  'workerd': true
