$schema: 'https://moonrepo.dev/schemas/tasks.json'

# Guard chain for packages published to npm. Each published package keeps a
# single npm lifecycle script, `"prepublishOnly": "moon run <name>:prepublish"`,
# which `pnpm publish` fires automatically; everything it runs is defined
# here.
#
# The chain stays `runInCI: 'skip'`: it depends on `build`, and moon ci
# --include-relations runs affected runInCI-enabled tasks even when they are
# not requested targets — which would drag publish guards into every CI run.
# Consequence: publishing from a CI-marked shell needs a `CI=` prefix, e.g.
# `CI= pnpm publish --dry-run`.
inheritedBy:
  tags: ['publishable']

tasks:
  # Publishes must use the pnpm version pinned in .prototools so lockfile and
  # package-manager behavior match CI. The script reads the pin itself.
  assert-pnpm-version:
    command: 'bun $workspaceRoot/scripts/assert-pnpm-version.ts'
    options:
      cache: false
      internal: true
      runInCI: 'skip'

  # Aggregator the prepublishOnly lifecycle hook points at. Projects append
  # extra guards via dep merge (e.g. accounts adds assert-no-ledger-store).
  prepublish:
    command: 'noop'
    deps:
      - 'assert-pnpm-version'
      - 'build'
    options:
      cache: false
      runInCI: 'skip'
