$schema: 'https://moonrepo.dev/schemas/workspace.json'

# Fail fast when a developer's proto-installed moon drifts from the repo pin
# in .prototools; both must move together.
versionConstraint: '2.3.3'

projects:
  globs:
    - 'packages/*'
    - 'apps/*'
  sources:
    # Repo-wide tooling (lint, format, clean) lives on the root project.
    root: '.'

vcs:
  client: 'git'
  defaultBranch: 'main'
  # moon generates .moon/hooks/* (gitignored) and points the worktree-local
  # core.hooksPath at it, so every clone gets hooks from any moon command
  # without an install-time side effect like husky's prepare.
  sync: true
  hooks:
    pre-commit:
      # Typecheck the projects affected by staged files (and their
      # dependents), then format the post-build worktree. lint-staged still
      # runs after that because it only sees staged paths and re-stages
      # formatter/linter fixes for files that are included in the commit.
      - 'moon exec :typecheck --affected --status staged'
      - 'moon run root:format'
      - 'pnpm exec lint-staged'
