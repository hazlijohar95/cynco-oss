$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
tags: ['tsdown', 'publishable', 'tier-domain']

tasks:
  # Replaces the tsdown tag build: ledger-core and theme sources are inlined
  # into the bundle (noExternal), asserted after every build by the shared
  # private-import guard so no inlined engine leaks as a runtime import. The
  # guard derives its forbidden list from the release table (PUBLISH_CONFIGS),
  # so it stays correct without a per-package script.
  build:
    script:
      'tsdown --clean && bun $workspaceRoot/scripts/assert-no-private-imports.ts'
    deps:
      - '^:build'
    inputs:
      - 'src/**/*'
      - '/scripts/assert-no-private-imports.ts'
      - '/scripts/publish.ts'
      - 'tsdown.config.ts'
      - 'tsconfig.json'
      - '/packages/ledger-core/src/**/*'
      - '/packages/theme/src/**/*'
    outputs:
      - 'dist'
    options:
      merge: 'replace'

  # Replaces the tsdown tag dev: also watch the inlined engine sources. Keep
  # the watcher non-cleaning so app dev servers never resolve packages while
  # their dist directories are temporarily empty.
  dev:
    command:
      'tsdown --watch src --watch ../ledger-core/src --watch ../theme/src
      --no-clean --log-level error'
    deps:
      - '^:build'
    options:
      merge: 'replace'
      cache: false
      persistent: true
      runInCI: 'skip'

  # Extends the publishable tag chain: direct `pnpm publish` must fail while
  # package.json still carries the inlined workspace dependencies. The real
  # release path is `moonx accounts:publish`.
  prepublish:
    command: 'noop'
    deps:
      - 'assert-pnpm-version'
      - 'build'
      - 'assert-safe-publish'
    options:
      merge: 'replace'
      cache: false
      runInCI: 'skip'

  assert-safe-publish:
    command: 'bun scripts/assert-safe-publish.ts'
    options:
      cache: false
      internal: true
      runInCI: 'skip'

  # The `publish` task itself is inherited from the publishable tag: the
  # shared $workspaceRoot/scripts/publish.ts strips the inlined workspace
  # deps from the packed manifest before anything reaches the registry.

  # No preset: presets force `runInCI: skip` and moon refuses to run such
  # tasks in CI-detected shells (agent harnesses export CI=1). Never targeted
  # by the CI lanes; no graph edges so it can never be pulled in.
  benchmark:
    command: 'bun scripts/benchmark.ts'
    options:
      cache: false
      runInCI: 'always'

  # Playwright e2e against the BUILT dist served by the harness vite server
  # (deps ['build'] keeps dist fresh). The leading check self-heals a missing
  # Chromium binary so fresh clones and CI runners work without a manual
  # install step.
  test-e2e:
    script:
      '(bun ./test/e2e/check-playwright-binary.ts || pnpm exec playwright
      install chromium) && pnpm exec playwright test -c
      test/e2e/playwright.config.ts --grep-invert @diagnostic'
    deps:
      - 'build'
    inputs:
      - 'src/**/*'
      - 'test/e2e/**/*'
    options:
      # Worktree port offset for playwright (see scripts/wt.ts); missing in
      # the primary checkout, which keeps the default e2e port.
      envFile: '/.env.worktree'

  # Spawned by playwright's webServer (also under CI); ACCOUNTS_E2E_PORT is
  # provided by the caller, with a worktree-offset default for manual runs.
  test-e2e-server:
    script:
      'ACCOUNTS_E2E_PORT=${ACCOUNTS_E2E_PORT:-$(( ${CYNCO_PORT_OFFSET:-0} + 9232
      ))} vite --config test/e2e/vite.config.ts'
    options:
      cache: false
      persistent: true
      runInCI: 'always'
      envFile: '/.env.worktree'
