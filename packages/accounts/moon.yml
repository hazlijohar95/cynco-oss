$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
tags: ['tsdown', 'publishable', 'tier-domain']

tasks:
  # No preset: presets force `runInCI: skip` and moon refuses to run such
  # tasks in CI-detected shells (agent harnesses export CI=1). Never targeted
  # by the CI lanes; no graph edges so it can never be pulled in.
  benchmark:
    command: 'bun scripts/benchmark.ts'
    options:
      cache: false
      runInCI: 'always'

  # Playwright e2e against the BUILT dist served by the harness vite server
  # (deps ['build'] keeps dist fresh). The leading check self-heals a missing
  # Chromium binary so fresh clones and CI runners work without a manual
  # install step.
  test-e2e:
    script:
      '(bun ./test/e2e/check-playwright-binary.ts || pnpm exec playwright
      install chromium) && pnpm exec playwright test -c
      test/e2e/playwright.config.ts --grep-invert @diagnostic'
    deps:
      - 'build'
    inputs:
      - 'src/**/*'
      - 'test/e2e/**/*'
    options:
      # Worktree port offset for playwright (see scripts/wt.ts); missing in
      # the primary checkout, which keeps the default e2e port.
      envFile: '/.env.worktree'

  # Visual-regression lane: Playwright toHaveScreenshot against the
  # committed per-platform baselines in test/e2e/__screenshots__/. Modeled
  # on test-e2e (self-healing Chromium install, same webServer task on the
  # lane's own port) but strictly local-only: runInCI 'always' with NO graph
  # edges — no deps, no dependents — so per the root moon.yml header it can
  # never become affected and never joins `moon ci` uninvited. The dist
  # freshness test-e2e gets from deps:['build'] comes instead from the
  # nested `moon run`, the same in-process spawn pattern the playwright
  # webServer already uses for test-e2e-server. cache: false because the
  # task's real output is a pixel comparison against baseline files, not a
  # cacheable artifact — a re-run must always re-capture.
  test-vrt:
    script:
      'moon run accounts:build && (bun ./test/e2e/check-playwright-binary.ts ||
      pnpm exec playwright install chromium) && pnpm exec playwright test -c
      test/e2e/playwright.vrt.config.ts'
    options:
      cache: false
      runInCI: 'always'
      # Worktree port offset for playwright (see scripts/wt.ts); missing in
      # the primary checkout, which keeps the default VRT port.
      envFile: '/.env.worktree'

  # Spawned by playwright's webServer (also under CI); ACCOUNTS_E2E_PORT is
  # provided by the caller, with a worktree-offset default for manual runs.
  test-e2e-server:
    script:
      'ACCOUNTS_E2E_PORT=${ACCOUNTS_E2E_PORT:-$(( ${CYNCO_PORT_OFFSET:-0} + 9232
      ))} vite --config test/e2e/vite.config.ts'
    options:
      cache: false
      persistent: true
      runInCI: 'always'
      envFile: '/.env.worktree'
