$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
tags: ['tsdown', 'publishable']

tasks:
  # Replaces the tsdown tag build: ledger-store and theme sources are inlined
  # into the bundle (noExternal), asserted after every build so the private
  # engine never leaks as a runtime import.
  build:
    script: 'tsdown --clean && bun scripts/assert-no-ledger-store.ts'
    deps:
      - '^:build'
    inputs:
      - 'src/**/*'
      - 'scripts/assert-no-ledger-store.ts'
      - 'tsdown.config.ts'
      - 'tsconfig.json'
      - '/packages/ledger-store/src/**/*'
      - '/packages/theme/src/**/*'
    outputs:
      - 'dist'
    options:
      merge: 'replace'

  # Replaces the tsdown tag dev: also watch the inlined engine sources. Keep
  # the watcher non-cleaning so app dev servers never resolve packages while
  # their dist directories are temporarily empty.
  dev:
    command:
      'tsdown --watch src --watch ../ledger-store/src --watch ../theme/src
      --no-clean --log-level error'
    deps:
      - '^:build'
    options:
      merge: 'replace'
      cache: false
      persistent: true
      runInCI: 'skip'

  # No preset: presets force `runInCI: skip` and moon refuses to run such
  # tasks in CI-detected shells (agent harnesses export CI=1). Never targeted
  # by the CI lanes; no graph edges so it can never be pulled in.
  benchmark:
    command: 'bun scripts/benchmark.ts'
    options:
      cache: false
      runInCI: 'always'
